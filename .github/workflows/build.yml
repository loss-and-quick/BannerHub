name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
      - '!v*-pre*'
      - '!v*-beta*'

jobs:

  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download original APK
        run: |
          gh release download base-apk --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out_base -f

      - name: Remove uncompilable apktool artifacts
        run: |
          rm -f apktool_out_base/res/values/raws.xml
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' apktool_out_base/res/values/public.xml

          # Extract original classes12.dex and skip smali reassembly (dex index limit workaround)
          APK=$(ls base/*.apk | head -1)
          unzip -p "$APK" classes12.dex > apktool_out_base/classes12.dex
          rm -rf apktool_out_base/smali_classes12

      - name: Apply patches
        run: |
          if [ -d "patches" ] && [ "$(ls -A patches)" ]; then
            echo "Applying patches..."
            cp -r patches/. apktool_out_base/
            echo "Patches applied."
          else
            echo "No patches to apply."
          fi

      - name: Apply Grant Root Access smali patches
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          # Patch 1: SettingBtnHolder.w() — handle click for contentType=0x64 (Grant Root Access)
          # Injected EARLY right after getContentType() move-result p0, while p2 is still a View.
          patch(
              'apktool_out_base/smali_classes6/com/xj/landscape/launcher/ui/setting/holder/SettingBtnHolder.smali',
              '    move-result p0\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              '    move-result p0\n'
              '\n'
              '    # BannerHub: Grant Root Access (contentType=0x64) — injected early while p2 is still a View\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_root_grant\n'
              '\n'
              '    invoke-virtual {p2}, Landroid/view/View;->getContext()Landroid/content/Context;\n'
              '\n'
              '    move-result-object v0\n'
              '\n'
              '    invoke-static {v0}, Lcom/xj/winemu/sidebar/BhRootGrantHelper;->requestRoot(Landroid/content/Context;)V\n'
              '\n'
              '    sget-object v0, Lkotlin/Unit;->a:Lkotlin/Unit;\n'
              '\n'
              '    return-object v0\n'
              '\n'
              '    :bh_skip_root_grant\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              'SettingBtnHolder.w(): Grant Root Access click handler (contentType=0x64)'
          )

          # Patch 2: SettingItemEntity.getContentName() — return "Grant Root Access" for contentType=0x64
          patch(
              'apktool_out_base/smali_classes13/com/xj/landscape/launcher/data/model/entity/SettingItemEntity.smali',
              '    :cond_15\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              '    :cond_15\n'
              '    # BannerHub: Grant Root Access (contentType=0x64)\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_grant_name\n'
              '\n'
              '    const-string p0, "Grant Root Access"\n'
              '\n'
              '    return-object p0\n'
              '\n'
              '    :bh_skip_grant_name\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              'SettingItemEntity.getContentName(): return "Grant Root Access" for contentType=0x64'
          )

          # Patch 3: SettingItemViewModel.k() — add Grant Root Access TYPE_BTN below Clear Cache
          patch(
              'apktool_out_base/smali_classes3/com/xj/landscape/launcher/vm/SettingItemViewModel.smali',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BannerHub: Grant Root Access button (contentType=0x64) below Clear Cache\n'
              '    new-instance v0, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;\n'
              '\n'
              '    const/16 v2, 0x64\n'
              '\n'
              '    invoke-direct/range {v0 .. v6}, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '-><init>(IILandroid/util/SparseArray;ZILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '\n'
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              'SettingItemViewModel.k(): add Grant Root Access TYPE_BTN after Clear Cache'
          )

          print("\nAll Grant Root Access patches applied successfully.")
          PYEOF

      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: apktool_out_base
          path: apktool_out_base/
          retention-days: 1

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - variant: Normal
            package: banner.hub
            label: "BannerHub"
          - variant: Normal(GHL)
            package: gamehub.lite
            label: "BannerHub"
          - variant: PuBG
            package: com.tencent.ig
            label: "BannerHub PuBG"
          - variant: AnTuTu
            package: com.antutu.ABenchMark
            label: "BannerHub AnTuTu"
          - variant: alt-AnTuTu
            package: com.antutu.benchmark.full
            label: "BannerHub AnTuTu"
          - variant: PuBG-CrossFire
            package: com.tencent.tmgp.cf
            label: "BannerHub PuBG CrossFire"
          - variant: Ludashi
            package: com.ludashi.aibench
            label: "BannerHub Ludashi"
          - variant: Genshin
            package: com.mihoyo.genshinimpact
            label: "BannerHub Genshin"
          - variant: Original
            package: com.xiaoji.egggame
            label: "BannerHub Original"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Download patched source
        uses: actions/download-artifact@v4
        with:
          name: apktool_out_base
          path: apktool_out

      - name: Patch package name and label
        run: |
          PKG="${{ matrix.package }}"
          LABEL="${{ matrix.label }}"
          if [ "$PKG" != "gamehub.lite" ]; then
            # Replace all occurrences of gamehub.lite in the manifest (package, sharedUserId, authorities, permissions, etc.)
            sed -i "s/gamehub\.lite/$PKG/g" apktool_out/AndroidManifest.xml
          fi
          sed -i "s/android:label=\"GameHub Revanced\"/android:label=\"$LABEL\"/" apktool_out/AndroidManifest.xml

      - name: Rebuild APK
        run: |
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Inject original classes12.dex (skipped smali reassembly due to dex index limit)
          zip rebuilt-unsigned.apk apktool_out/classes12.dex --junk-paths

      - name: Zipalign
        run: |
          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)
          ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/zipalign -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk

      - name: Sign
        id: sign
        run: |
          APK_NAME="BannerHub-${GITHUB_REF_NAME}-${{ matrix.variant }}.apk"
          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)
          ${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            rebuilt-aligned.apk
          echo "Completed: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sign.outputs.apk_name }}
          path: ${{ steps.sign.outputs.apk_name }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=manual-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: BannerHub-*.apk
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Bannerhub ${{ steps.tag.outputs.name }}
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: BannerHub-*.apk
